<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomolego</title>
  <meta name="description" content="A block-building Pomodoro timer. Every focus session builds a block in your world." />
  <link rel="icon" id="favicon" href="data:," />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-brick" aria-hidden="true"></span>
        <h1>Pomolego</h1>
      </div>
      <div class="header-actions">
        <button id="btn-album" class="icon-btn" title="Album" aria-label="Album">🖼️</button>
        <button id="btn-stats" class="icon-btn" title="Statistics" aria-label="Statistics">📊</button>
        <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Settings">⚙️</button>
      </div>
    </header>

    <div class="world-wrap">
      <div class="world-scroll" id="world-scroll">
        <canvas id="world-canvas"></canvas>
      </div>
    </div>

    <div id="unlock-banner" class="unlock-banner" hidden>
      <span class="unlock-spark" aria-hidden="true">✨</span>
      <canvas id="unlock-swatch" width="52" height="40"></canvas>
      <span id="unlock-text"></span>
      <button id="unlock-dismiss" class="icon-btn" aria-label="Dismiss">✕</button>
    </div>

    <section id="controls" class="controls" aria-live="polite"></section>
  </main>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h2>Settings</h2>
        <button class="icon-btn" data-close-modal aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="settings-body"></div>
    </div>
  </div>

  <!-- Album modal -->
  <div id="album-modal" class="modal" hidden>
    <div class="modal-card modal-card-wide">
      <div class="modal-head">
        <h2>Album</h2>
        <button class="icon-btn" data-close-modal aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="album-body"></div>
    </div>
  </div>

  <!-- Statistics modal -->
  <div id="stats-modal" class="modal" hidden>
    <div class="modal-card modal-card-wide">
      <div class="modal-head">
        <h2>Statistics</h2>
        <button class="icon-btn" data-close-modal aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="stats-body"></div>
    </div>
  </div>

  <!-- Silent completion overlay -->
  <div id="overlay" class="overlay" data-position="corner" hidden>
    <div class="overlay-card" id="overlay-card">
      <div class="overlay-art" id="overlay-art"></div>
      <div class="overlay-text" id="overlay-text"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
